name: Gitleaks PII & Secrets Scan (Reusable)

# Other repos can call this workflow to get the same scan with shared config.
# Usage in another repo's workflow:
#   jobs:
#     gitleaks:
#       uses: fitz123/claude-code-bot/.github/workflows/gitleaks-reusable.yml@main
#       secrets:
#         CONFIG_PAT: ${{ secrets.GITLEAKS_CONFIG_PAT }}  # PAT with read access to gitleaks-config repo

on:
  workflow_call:
    inputs:
      config-repo:
        description: "Repo containing .gitleaks.toml (owner/repo format)"
        required: false
        type: string
        default: "fitz123/gitleaks-config"
      config-ref:
        description: "Branch/tag of config repo to fetch .gitleaks.toml from"
        required: false
        type: string
        default: "main"
    secrets:
      CONFIG_PAT:
        description: "PAT with read access to the private config repo"
        required: false

jobs:
  gitleaks:
    name: Gitleaks PII Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch shared .gitleaks.toml
        env:
          CONFIG_PAT: ${{ secrets.CONFIG_PAT }}
        run: |
          # When CONFIG_PAT is available (trusted runs: push, owner PRs),
          # ALWAYS prefer the full private ruleset and overwrite any
          # checked-in baseline. Forked PRs run without the secret and
          # fall back to whatever .gitleaks.toml is committed to the repo
          # (a generic, safe-to-publish baseline) — that way external
          # contributions are still scanned, just not with corporate
          # patterns we never want in the public repo.
          if [[ -n "$CONFIG_PAT" ]]; then
            curl -fsSL \
              -H "Authorization: token $CONFIG_PAT" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ inputs.config-repo }}/contents/.gitleaks.toml?ref=${{ inputs.config-ref }}" \
              -o .gitleaks.toml
            echo "Using private .gitleaks.toml from ${{ inputs.config-repo }}@${{ inputs.config-ref }}"
          elif [[ -f .gitleaks.toml ]]; then
            echo "No CONFIG_PAT (likely a fork PR) — using checked-in .gitleaks.toml baseline"
          else
            echo "No CONFIG_PAT and no local .gitleaks.toml — falling back to gitleaks defaults"
          fi

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
