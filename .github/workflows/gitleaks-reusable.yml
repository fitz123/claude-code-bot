name: Gitleaks PII & Secrets Scan (Reusable)

# Other repos can call this workflow to get the same scan with shared config.
# Usage in another repo's workflow:
#   jobs:
#     gitleaks:
#       uses: fitz123/claude-code-bot/.github/workflows/gitleaks-reusable.yml@main
#       secrets:
#         CONFIG_PAT: ${{ secrets.GITLEAKS_CONFIG_PAT }}  # PAT with read access to gitleaks-config repo

on:
  workflow_call:
    inputs:
      config-repo:
        description: "Repo containing .gitleaks.toml (owner/repo format)"
        required: false
        type: string
        default: "fitz123/gitleaks-config"
      config-ref:
        description: "Branch/tag of config repo to fetch .gitleaks.toml from"
        required: false
        type: string
        default: "main"
    secrets:
      CONFIG_PAT:
        description: "PAT with read access to the private config repo"
        required: false

jobs:
  gitleaks:
    name: Gitleaks PII Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch shared .gitleaks.toml
        env:
          CONFIG_PAT: ${{ secrets.CONFIG_PAT }}
        run: |
          # When CONFIG_PAT is available (trusted runs: push, owner PRs),
          # ALWAYS prefer the full private ruleset and overwrite any
          # checked-in baseline. Forked PRs run without the secret and
          # fall back to whatever .gitleaks.toml is committed to the repo
          # (a generic, safe-to-publish baseline) — that way external
          # contributions are still scanned, just not with corporate
          # patterns we never want in the public repo.
          set -euo pipefail

          if [[ -n "${CONFIG_PAT:-}" ]]; then
            tmp="$(mktemp)"
            if ! curl -fsSL \
                 -H "Authorization: token $CONFIG_PAT" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 "https://api.github.com/repos/${{ inputs.config-repo }}/contents/.gitleaks.toml?ref=${{ inputs.config-ref }}" \
                 -o "$tmp"; then
              echo "FATAL: failed to fetch private gitleaks config from ${{ inputs.config-repo }}@${{ inputs.config-ref }}" >&2
              exit 1
            fi
            if ! grep -qE '^\[\[rules\]\]|^\[extend\]|^\[allowlist\]' "$tmp"; then
              echo "FATAL: fetched file does not look like a gitleaks TOML config" >&2
              head -5 "$tmp" >&2
              exit 1
            fi
            mv "$tmp" .gitleaks.toml
            echo "Using private .gitleaks.toml from ${{ inputs.config-repo }}@${{ inputs.config-ref }}"
          elif [[ -f .gitleaks.toml ]]; then
            echo "No CONFIG_PAT (likely a fork PR) — using checked-in .gitleaks.toml baseline"
          else
            echo "No CONFIG_PAT and no local .gitleaks.toml — falling back to gitleaks defaults"
          fi

      # Pass 1 — scan diffs of every commit in the range.
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pass 2 — scan commit messages.
      # gitleaks v8 `git` mode (what gitleaks-action runs above) only
      # inspects diffs; commit-message bodies are NOT scanned. Verified
      # empirically against gitleaks 8.x. This second pass extracts the
      # message for every commit in the same range and feeds them to
      # `gitleaks detect --no-git`. Mirrors the local pre-push hook so
      # CI and local pre-push have the same coverage.
      - name: Install gitleaks for commit-message scan
        if: always()
        env:
          GITLEAKS_VERSION: "8.21.4"
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          mkdir -p /tmp/gitleaks-bin
          tar -xz -C /tmp/gitleaks-bin -f /tmp/gitleaks.tar.gz
          chmod +x /tmp/gitleaks-bin/gitleaks
          /tmp/gitleaks-bin/gitleaks version

      - name: Scan commit messages for PII
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail

          # Determine the commit range to scan based on event type.
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            zero="0000000000000000000000000000000000000000"
            if [[ -z "${PUSH_BEFORE:-}" || "$PUSH_BEFORE" == "$zero" ]]; then
              # New branch push: scan just the head commit.
              range="$PUSH_AFTER"
            else
              range="${PUSH_BEFORE}..${PUSH_AFTER}"
            fi
          else
            echo "Unsupported event '$EVENT_NAME' — skipping commit-message scan."
            exit 0
          fi

          # Dump messages for the range to a plain file. The COMMIT-DELIM
          # marker is just so a multi-commit dump is readable in logs;
          # gitleaks treats the whole file as opaque text either way.
          msgdir="$(mktemp -d)"
          git log --format='%H%n%B%n---COMMIT-DELIM---' "$range" \
            > "$msgdir/messages.txt"

          if [[ ! -s "$msgdir/messages.txt" ]]; then
            echo "No commits in range $range — nothing to scan."
            exit 0
          fi

          echo "Scanning commit messages in $range with gitleaks..."
          if [[ -f .gitleaks.toml ]]; then
            /tmp/gitleaks-bin/gitleaks detect --no-git \
              --source "$msgdir" --config .gitleaks.toml --redact
          else
            /tmp/gitleaks-bin/gitleaks detect --no-git \
              --source "$msgdir" --redact
          fi
