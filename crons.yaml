# Cron job definitions — loaded by cron-runner.ts
# All times are Europe/Moscow (GMT+3) — machine timezone
# Prompts adapted for Claude Code CLI runtime (Bash/Read/Edit tools, deliver.sh for messaging)

crons:
  # ══════════════════════════════════════════
  # MEMORY CONSOLIDATION (1 cron, nightly)
  # ══════════════════════════════════════════

  - name: memory-consolidation-main
    enabled: false
    schedule: "10 2 * * *"
    prompt: >
      Запусти skill memory-consolidation. Прочитай SKILL.md:
      ~/.minime/workspace/.claude/skills/memory-consolidation/SKILL.md и профиль:
      ~/.minime/workspace/.claude/skills/memory-consolidation/profiles/main.yaml.
      Выполни полный pipeline (preflight -> lock -> fast-path -> gather -> diff -> fix -> report).
      Safe-edit режим — применяй изменения.
      По завершении выведи краткий отчёт (Memory consolidation + сегодняшняя дата).
    agentId: main
    deliveryChatId: 306600687
    timeout: 600000
    maxBudget: 1.00

  # ══════════════════════════════════════════
  # WORKSPACE & BACKUP (2 crons, nightly)
  # ══════════════════════════════════════════

  - name: workspace-health
    enabled: false
    schedule: "30 3 * * *"
    prompt: >
      Ежедневный прогон skill workspace-health. Прочитай SKILL.md:
      ~/.minime/workspace/.claude/skills/workspace-health/SKILL.md и выполни полный pipeline
      (git sync -> upstream sync -> size audit -> fact verification -> content quality -> cleanup -> commit fixes).
      НЕ пушь — backup-git сделает push позже.
      Выведи финальный отчёт.
    agentId: main
    deliveryChatId: 306600687
    timeout: 900000
    maxBudget: 1.00

  - name: backup-git
    schedule: "0 4 * * *"
    prompt: >
      Ежедневный backup. Прочитай SKILL.md:
      ~/.minime/workspace/.claude/skills/backup-git/SKILL.md и выполни pipeline:
      1. Запусти: bash ~/.minime/workspace/.claude/skills/backup-git/scripts/git-backup.sh ~/.minime/workspace
      2. Прочитай JSON из stdout.
      3. Если status=ok: выведи '💾 Backup — pushed <commit> (<message>)'.
      4. Если status=no_changes: ответь NO_REPLY.
      5. Если status=error: выведи '🔴 Backup FAILED — <message>'.
    agentId: main
    deliveryChatId: 306600687
    timeout: 300000
    maxBudget: 0.50

  # ══════════════════════════════════════════
  # COLLECTOR / DATA PIPELINE (3 crons)
  # ══════════════════════════════════════════

  - name: collector-v1-collect
    schedule: "0 */3 * * *"
    prompt: >
      Run collector-v1 CIAN background collection silently.
      Run this command:
      cd /Users/ninja/.minime/workspace/scripts/collector-v1 && uv run python collector.py --mode collect --source cian 2>&1 | tail -50
      If command succeeds, respond NO_REPLY.
      If command fails, output: '⚠️ collector-v1-collect failed. Check logs in scripts/collector-v1.'
    agentId: main
    deliveryChatId: 306600687
    timeout: 1500000
    maxBudget: 0.50

  - name: collector-v1-liveness
    schedule: "0 4 * * *"
    prompt: >
      Run collector-v1 liveness check (live, no dry-run) silently.
      Run this command:
      cd /Users/ninja/.minime/workspace/scripts/collector-v1 && uv run python collector.py --mode liveness 2>&1 | tail -50
      If command succeeds, respond NO_REPLY.
      If command fails, output: '⚠️ collector-v1-liveness failed. Check logs.'
    agentId: main
    deliveryChatId: 306600687
    timeout: 1200000
    maxBudget: 0.50

  - name: collector-v1-coverage-daily
    schedule: "20 9 * * *"
    prompt: |
      Send daily CIAN collector coverage report.

      Run this Python script:
      python3 - <<'PY'
      import sqlite3, sys
      from pathlib import Path
      base=Path('/Users/ninja/.minime/workspace/scripts/collector-v1')
      sys.path.insert(0, str(base))
      from filter_engine import filter_listings
      from config import CollectorConfig

      db=base/'data'/'listings.db'
      conn=sqlite3.connect(db)
      conn.row_factory=sqlite3.Row

      def scalar(sql,args=()):
          return conn.execute(sql,args).fetchone()[0]

      total=scalar('select count(*) from listings')
      active=scalar('select count(*) from listings where is_active=1')
      rows=conn.execute('''
      select source, source_id, url, price, area, rooms,
      address, district, metro, description,
      floor, floors_total, building_type, furniture,
      author_type, commissions,
      first_seen, last_seen, is_active, shown
      from listings where is_active=1
      ''').fetchall()
      items=[dict(r) for r in rows]
      fr=filter_listings(items, CollectorConfig().filter_config)
      passed=len(fr.passed)

      states=conn.execute("select query_key, frontier_page from crawl_state where source='cian' order by query_key").fetchall()
      max_page=54
      expected=6*max_page
      frontier=sum(min(r['frontier_page'], max_page) for r in states)
      coverage=(frontier/expected*100) if expected else 0

      rooms=', '.join(f"{r['query_key']}={r['frontier_page']}" for r in states)
      msg=(
      f"📊 CIAN coverage daily\n"
      f"• База: {active} active / {total} total\n"
      f"• Под фильтры: {passed} ({(passed/active*100 if active else 0):.1f}%)\n"
      f"• Покрытие crawl: {frontier}/{expected} стр. ({coverage:.1f}%)\n"
      f"• Frontier: {rooms if rooms else 'нет данных'}"
      )
      print(msg)
      PY

      Output the exact text from the command. If it fails, output: '⚠️ collector-v1 coverage report failed.'
    agentId: main
    deliveryChatId: 306600687
    timeout: 240000
    maxBudget: 0.50

  # ══════════════════════════════════════════
  # INFRASTRUCTURE SCRIPTS (3 crons)
  # ══════════════════════════════════════════

  - name: int__video-encode-supervisor
    schedule: "every 600"
    prompt: >
      Ensure continuous MOV encode daemon is running.
      Run: /Users/ninja/.minime/workspace/scripts/video_encode_daemon_ensure.sh
      If output starts with 'already_running' or 'started', respond NO_REPLY.
      If command fails, output: '⚠️ Encode daemon supervisor error: <error details>'
    agentId: main
    deliveryChatId: 306600687
    timeout: 120000
    maxBudget: 0.20

  # ══════════════════════════════════════════
  # DAILY TASK MANAGEMENT (3 crons)
  # ══════════════════════════════════════════

  - name: int__beads-morning-standup
    schedule: "0 9 * * *"
    prompt: |
      Morning standup для Ninja. Workspace: /Users/ninja/.minime/workspace

      1. Запусти команды:
         - cd /Users/ninja/.minime/workspace && bd ready --json
         - bd list --overdue --json
         - bd list --due-before tomorrow --json

      2. ВАЖНО по классификации:
         - задачи со статусом in_progress НЕ называть «просроченными» (это активная работа)
         - «Просроченные» = только overdue со статусом НЕ in_progress
         - in_progress с прошедшим due показывать: «В работе (без эскалации)»

      3. ОБЯЗАТЕЛЬНО проверь календарь на сегодня:
         - icalBuddy -f -n -nc eventsToday
         - Включи встречи/события в план дня
         - Календарь = истина

      4. Прочитай memory/YYYY-MM-DD.md (вчера) — контекст.

      5. Сформируй сообщение:
         - 🏋️ Зал сегодня? (из календаря)
         - 📅 Встречи/события сегодня
         - 🔴 Просроченные (только НЕ in_progress)
         - 🔄 В работе (in_progress)
         - 🎯 Топ-1 приоритет на день

      Коротко и actionable. Выведи отчёт как текст.
    agentId: main
    deliveryChatId: 306600687
    timeout: 300000
    maxBudget: 0.50

  - name: int__beads-evening-review
    schedule: "30 22 * * *"
    prompt: |
      Evening review для Ninja. Workspace: /Users/ninja/.minime/workspace

      1. Запусти команды:
         - cd /Users/ninja/.minime/workspace && bd list --status closed --closed-after $(date -v-1d +%Y-%m-%d) --json
         - bd ready --json
         - bd list --overdue --json
         - bd list --due-before $(date -v+2d +%Y-%m-%d) --json

      2. Классификация overdue:
         - «⚠️ Просроченные» — только задачи со статусом НЕ in_progress
         - in_progress с прошедшим due — отдельный блок «🔄 В работе (без эскалации)»

      3. ОБЯЗАТЕЛЬНО проверь календарь на завтра:
         - icalBuddy -f -n -nc eventsToday+1
         - Найди САМОЕ РАННЕЕ событие завтра
         - Подъём = время раннего события - 45 минут
         - Уснуть = подъём - 8 часов
         - Начать готовиться ко сну = уснуть - 45 минут
         - Если событий нет: «свободное утро»

      4. Прочитай memory/YYYY-MM-DD.md (сегодня) — что происходило.

      5. Сформируй сообщение:
         - ✅ Сделано сегодня
         - 🎯 Фокус на завтра — топ-1 задача
         - ⚠️ Просроченные (только НЕ in_progress)
         - 🔄 В работе
         - 📅 Завтрашние встречи/события из календаря
         - ⏰ Подъём — рассчитанный от самого раннего события
         - 💤 Сон — «начать готовиться» и «уснуть к»

      Коротко. Не весь список задач — только релевантное.
    agentId: main
    deliveryChatId: 306600687
    timeout: 600000
    maxBudget: 1.00

  - name: int__beads-weekly-review
    schedule: "0 10 * * 1"
    prompt: |
      Weekly review для Ninja. Workspace: /Users/ninja/.minime/workspace

      1. Запусти команды:
         - cd /Users/ninja/.minime/workspace && bd list --status closed --closed-after $(date -v-7d +%Y-%m-%d) --json
         - bd ready --json
         - bd list --overdue --json
         - bd stale --json
         - bd count

      2. Прочитай memory/*.md за последнюю неделю — тренды, решения, контекст.

      3. Сформируй отчёт:
         - 📊 Итоги недели: сколько закрыто, какие категории
         - 🔴 Просроченные: список с next steps
         - ⏳ Застрявшие: предложить действие или понизить приоритет
         - 🎯 Приоритеты на неделю: топ-3 задачи
         - 💡 Предложения: паттерны, декомпозиция

      Отчёт полезный, не формальный. Если всё чисто — коротко.
    agentId: main
    deliveryChatId: 306600687
    timeout: 300000
    maxBudget: 0.50

  # ══════════════════════════════════════════
  # VITAMINKA SCHEDULERS (2 crons, daily 10:00)
  # ══════════════════════════════════════════

  - name: int__vitaminka-scheduler-yulia
    enabled: false
    schedule: "0 10 * * *"
    prompt: |
      ВИТАМИНКА для Юли — combined scheduler + sender.

      1. Прочитай ~/.minime/workspace/reference/vitaminka-yulia-cron.md — разделы 2, 3, 4.
      2. Выбери случайную тему (1-20): python3 -c "import random; print(random.randint(1,20))"
      3. Проверь дедупликацию: tail -3 ~/.minime/workspace/reference/vitaminka-log.jsonl
         Если тема совпадает с последними 3 — выбери другую.
      4. Найди веб-факт по теме через поиск.
      5. Напиши 2-4 предложения в стиле Антона (тёплый, с юмором). Контекст о Юле — из документа.
         ВАЖНО: кот Бастер Китон — ПОЛОСАТЫЙ ТАББИ, не рыжий.
         НЕ упоминать что это автоматическое/запланированное.
      6. Отправь сообщение Юле: /Users/ninja/.openclaw/bot/scripts/deliver.sh 1320328600 <<< '<сообщение>'
      7. Запиши в лог: echo '{"date":"<today>","topic":<N>,"sent":true}' >> ~/.minime/workspace/reference/vitaminka-log.jsonl

      После отправки ответь NO_REPLY.
      Если файл vitaminka-yulia-cron.md не найден — выведи ошибку.
    agentId: main
    deliveryChatId: 306600687
    timeout: 180000
    maxBudget: 0.50

  - name: int__vitaminka-scheduler-anna
    enabled: false
    schedule: "0 10 * * *"
    prompt: |
      ВИТАМИНКА для Анны — combined scheduler + sender.

      1. Прочитай ~/.minime/workspace/reference/vitaminka-anna-cron.md — разделы 2, 3, 4.
      2. Выбери случайную тему (1-20): python3 -c "import random; print(random.randint(1,20))"
      3. Проверь дедупликацию: tail -3 ~/.minime/workspace/reference/vitaminka-anna-log.jsonl
         Если тема совпадает с последними 3 — выбери другую.
      4. Найди веб-факт по теме через поиск.
      5. Напиши 2-4 предложения в стиле Антона (тёплый, с юмором). Контекст об Анне — из документа.
         НЕ упоминать что это автоматическое/запланированное.
      6. Отправь сообщение Анне: /Users/ninja/.openclaw/bot/scripts/deliver.sh 7418988410 <<< '<сообщение>'
      7. Запиши в лог: echo '{"date":"<today>","topic":<N>,"sent":true}' >> ~/.minime/workspace/reference/vitaminka-anna-log.jsonl

      После отправки ответь NO_REPLY.
      Если файл vitaminka-anna-cron.md не найден — выведи ошибку.
    agentId: main
    deliveryChatId: 306600687
    timeout: 600000
    maxBudget: 0.50

  # ══════════════════════════════════════════
  # MONITORING & SECURITY (2 crons)
  # ══════════════════════════════════════════

  # ══════════════════════════════════════════
  # WORK-LIFE REMINDERS (2 crons, Telegram)
  # ══════════════════════════════════════════

  - name: tg-306600687__work-end-reminder
    schedule: "0 20 * * 1-5"
    prompt: >
      20:00 — конец рабочего дня.
      Проверь есть ли активные claude процессы: ps aux | grep 'claude.*session' | grep -v grep | wc -l
      Если есть активные процессы (>0) — Ninja общается — ответь NO_REPLY.
      Если нет активных — Ninja работает молча — выведи напоминание:
      '20:00, конец рабочего дня. Запиши что осталось, закрой ноут, прогулка в 20:30.'
    agentId: main
    deliveryChatId: 306600687
    timeout: 120000
    maxBudget: 0.20

  - name: tg-306600687__bedtime-reminder
    schedule: "15 23 * * *"
    prompt: |
      Напоминание о сне для Ninja. Рассчитай время отбоя по КАЛЕНДАРЮ.

      1. Проверь события на ЗАВТРА: icalBuddy -f -n -nc eventsToday+1

      2. Найди САМОЕ РАННЕЕ событие завтра (любое).

      3. Рассчитай:
         - Подъём = время события - 45 минут
         - Уснуть = подъём - 8 часов
         - Начать готовиться = уснуть - 45 минут
         Пример: зал 08:00 -> подъём 07:15 -> уснуть к 23:15 -> начать в 22:30

      4. Логика отправки (сейчас 23:15 MSK):
         - Если 'начать готовиться' <= 23:15 -> СРОЧНО! Выведи напоминание.
         - Если 'начать' между 23:15 и 01:00 -> выведи с точным временем.
         - Если 'начать' > 01:00 -> рано, NO_REPLY.
         - Если НЕТ событий завтра -> NO_REPLY.

      5. Текст: 'Завтра [событие] в [время] -> подъём [время] -> уснуть к [время]. Пора готовиться.'

      ТОЛЬКО календарь = истина.
    agentId: main
    deliveryChatId: 306600687
    timeout: 300000
    maxBudget: 0.50

  # ══════════════════════════════════════════
  # WEEKLY TASKS (3 crons)
  # ══════════════════════════════════════════

  - name: int__brew-weekly-upgrade
    schedule: "0 4 * * 6"
    prompt: >
      Выполни weekly brew upgrade + refresh firewall rule для node.
      Run: /Users/ninja/.minime/workspace/scripts/brew-weekly-upgrade.sh
      Wait for completion (may take several minutes).
      If command succeeds, respond NO_REPLY.
      If command fails, output: '⚠️ brew-weekly-upgrade failed. Проверь логи и ручной запуск.'
    agentId: main
    deliveryChatId: 306600687
    timeout: 2400000
    maxBudget: 0.50

  - name: tg-1003783997959__cyber-weekly-morning-status
    enabled: false
    schedule: "0 10 * * 1"
    prompt: |
      Собери weekly статус для группы КИБЕР-ГЕНПОДРЯД.

      1) Запусти:
      python3 /Users/ninja/.openclaw/workspace-cyber-architect/scripts/status_preflight.py \
        --status-file /Users/ninja/.openclaw/workspace-cyber-architect/MEMORY.md \
        --state-file /Users/ninja/.openclaw/workspace-cyber-architect/memory/cyber-status-sent.json \
        --ttl-hours 36

      2) Разбери JSON из stdout:
      - action=no_reply -> ответь NO_REPLY.
      - action=stale -> выведи: 'Статус-источник устарел, нужна синхронизация. Последняя отметка: <updated_at>.'
      - action=send -> выведи поле text, затем вызови mark-sent:
        python3 /Users/ninja/.openclaw/workspace-cyber-architect/scripts/status_preflight.py \
          --mark-sent --hash <hash> \
          --status-file /Users/ninja/.openclaw/workspace-cyber-architect/MEMORY.md \
          --state-file /Users/ninja/.openclaw/workspace-cyber-architect/memory/cyber-status-sent.json

      Без служебных комментариев в выводе.
    agentId: cyber-architect
    deliveryChatId: -1003783997959
    timeout: 300000
    maxBudget: 0.50

  # ══════════════════════════════════════════
  # SYSTEM (1 cron)
  # ══════════════════════════════════════════

  - name: cron-health-monitor
    schedule: "0 8 * * 1"
    prompt: >
      Read skills/cron-health-monitor/SKILL.md and follow its instructions.
      Additionally check launchd cron status: launchctl list | grep ai.openclaw.cron | wc -l
      And check recent cron log errors: grep -l 'FAIL' /Users/ninja/.openclaw/logs/cron-*.log 2>/dev/null | head -10
    agentId: main
    deliveryChatId: 306600687
    timeout: 300000
    maxBudget: 0.50
