# OpenClaw Telegram Bot Configuration

telegramTokenService: telegram-bot-token

agents:
  main:
    id: main
    workspaceCwd: /Users/ninja/.openclaw/workspace
    model: claude-opus-4-6
    fallbackModel: claude-sonnet-4-6
    maxTurns: 250 # just a safety from infinite loop
    effort: high

bindings:
  - chatId: 306600687
    agentId: main
    kind: dm
    label: Ninja DM

sessionDefaults:
  idleTimeoutMs: 14400000 # 4hrs
  maxConcurrentSessions: 3
