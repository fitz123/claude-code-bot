# Minime Bot Configuration
#
# This file ships with working defaults.
# Per-instance overrides go in config.local.yaml (gitignored, deep-merged over this file).
# Only user-specific values need to be in config.local.yaml:
#   agents.<name>.workspaceCwd, bindings with real chatIds, discord config.

# Runtime token sources. SOPS is the canonical private-workspace backend; env
# vars remain available as explicit non-Keychain deployment overrides.
secrets:
  sopsFile: config/secrets.sops.yaml
telegramTokenSopsKey: telegram.bot_token
# telegramTokenEnv: TELEGRAM_BOT_TOKEN
logLevel: info

# Agents must set explicit Pi/Codex models. The top-level defaultModel key is
# accepted for old config overlays but is no longer inherited by agents.
defaultModel: gpt-5.5

agents:
  main:
    id: main
    workspaceCwd: /tmp/minime-workspace   # override in config.local.yaml with your actual workspace path
    model: gpt-5.5
    thinking: high    # Pi/Codex thinking level: off|minimal|low|medium|high|xhigh.
    # provider: pi    # optional compatibility field; omit or set to "pi".
                      # Cron backend selection is separate: set crons*.yaml `engine: pi` per LLM cron.
                      # Pi crons use workspaceCwd, optional systemPrompt, and thinking.

  # Add more agents as needed:
  # coder:
  #   id: coder
  #   workspaceCwd: /tmp/minime-workspace-coder
  #   model: gpt-5.5

bindings:
  - chatId: 111111111           # override in config.local.yaml with your Telegram user ID (numeric)
    agentId: main
    kind: dm                    # "dm" or "group"
    label: My DM

  # Group binding example (forum supergroup with per-topic routing):
  # - chatId: -100111111111
  #   agentId: main
  #   kind: group
  #   label: My Group
  #
  #   ## Binding options (all optional):
  #   # requireMention: true          # require @mention or reply-to-bot (overrides sessionDefaults.requireMention; default for DMs: always false)
  #   # voiceTranscriptEcho: true     # echo voice transcript back to chat (default: true)
  #   # typingIndicator: true         # send typing indicators while processing (default: true)
  #
  #   ## Per-topic overrides (forum supergroups only):
  #   # topics:
  #   #   - topicId: 42
  #   #     agentId: coder
  #   #     requireMention: false

sessionDefaults:
  idleTimeoutMs: 3600000              # 1 hour (default)
  maxConcurrentSessions: 12           # default
  maxMessageAgeMs: 600000             # 10 min — discard stale messages on restart (default)
  # requireMention: true              # global default for @mention gating in groups (default: true; per-binding overrides)
  # maxMediaBytes: 209715200          # example: 200 MB global cap for downloaded photos/docs retained across turns
                                      # (example default: 209715200 bytes = 10× the 20 MB Telegram per-file limit).
                                      # Files persist under /tmp/bot-media/<chatId>/ until session close;
                                      # when this cap is exceeded, oldest files across all sessions are evicted first.
                                      # Bump this if agents in long-lived sessions frequently reference old media.

metricsPort: 9091

# Default delivery target for cron results (optional).
# Individual crons can override with their own deliveryChatId/deliveryThreadId.
# defaultDeliveryChatId: -1001234567890
# defaultDeliveryThreadId: 42

# Admin chat for fallback notifications when cron delivery fails (optional).
# adminChatId: 123456789

# Discord support (optional — bot works Telegram-only without this section)
# discord:
#   tokenSopsKey: discord.bot_token
#   tokenEnv: DISCORD_BOT_TOKEN
#   bindings:
#     - guildId: '1234567890'
#       agentId: main
#       kind: channel
#       label: My Server
#       requireMention: true
#       typingIndicator: true
