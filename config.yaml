# OpenClaw Telegram Bot Configuration

telegramTokenService: telegram-bot-token
logLevel: debug

agents:
  main:
    id: main
    workspaceCwd: /Users/ninja/.minime/workspace
    model: claude-opus-4-6
    fallbackModel: claude-sonnet-4-6
    maxTurns: 250 # just a safety from infinite loop
    effort: high

  coder:
    id: coder
    workspaceCwd: /Users/ninja/.minime/workspace-coder
    model: claude-opus-4-6
    maxTurns: 250
    effort: high

  anna:
    id: anna
    workspaceCwd: /Users/ninja/.minime/workspace-anna
    model: claude-opus-4-6
    maxTurns: 150

  yulia:
    id: yulia
    workspaceCwd: /Users/ninja/.minime/workspace-yulia
    model: claude-opus-4-6
    maxTurns: 150

bindings:
  - chatId: 306600687
    agentId: main
    kind: dm
    label: Ninja DM

  - chatId: 7418988410
    agentId: anna
    kind: dm
    label: Anna DM

  - chatId: 1320328600
    agentId: yulia
    kind: dm
    label: Yulia DM

  - chatId: -1003894624477
    agentId: main
    kind: group
    label: Minime HQ
    requireMention: false
    streamingUpdates: false
    typingIndicator: false
    topics:
      - topicId: 1667
        agentId: coder
        label: ЦИАН

sessionDefaults:
  idleTimeoutMs: 3600000 # 1hr
  maxConcurrentSessions: 12
  maxMessageAgeMs: 600000 # 10 min — discard messages older than this on restart

metricsPort: 9091

discord:
  tokenService: discord-bot-token
  bindings:
    - guildId: '1470077196537168007'
      agentId: main
      kind: channel
      label: Ninja Server
      requireMention: false
